<mat-card class="login-page">
  <mat-card-title>Login</mat-card-title>
  <mat-card-content>

    <form class="login-form data-form" #loginForm="ngForm">

      <mat-form-field>

        <input matInput type="email" name="email" ngModel #email="ngModel" required email minlength="3" maxlength="20" placeholder="Email">
        <mat-error *ngIf="email.errors?.required">An email is required.</mat-error>
        <mat-error *ngIf="email.errors?.minlength">You email must have a minimum of {{email.errors?.minlength.requiredLength}} chars,
          but it only has {{email.errors?.minlength.actualLength}}.
        </mat-error>
        <mat-error *ngIf="email.errors?.email">Email address is invalid.</mat-error>

      </mat-form-field>

      <mat-form-field>

        <input matInput type="password" name="password" ngModel #password="ngModel" placeholder="Password" required>

      </mat-form-field>

      <button mat-raised-button color="primary" (click)="login(loginForm)">
        Login
      </button>

    </form>

  </mat-card-content>
</mat-card>
